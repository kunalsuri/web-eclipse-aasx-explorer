name: AI Knowledge-Base Check

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: read

jobs:
  ai-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git drift (stale) check
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install ai-fication-kit
        # The kit is not published to the npm registry yet — install straight
        # from GitHub (same source the docs' npx one-liner uses). Pin to a tag
        # (…#vX.Y.Z) once releases are tagged.
        run: npm install -g github:kunalsuri/ai-fication-kit
      - name: Verify Path Claims
        if: always()
        run: ai-fication-kit verify . --strict --github-summary
      - name: Check for Code Drift
        if: always()
        run: ai-fication-kit drift . --git --strict --github-summary
